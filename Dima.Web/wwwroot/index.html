<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dima - Controle Financeiro</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="_content/MudBlazor/MudBlazor.min.css?v=1" rel="stylesheet" />

    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/landing.css" />
    <link href="Dima.Web.styles.css" rel="stylesheet" />
    
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
    <script type="importmap"></script>
    <script src="https://js.stripe.com/v3" async></script>
</head>

<body>
    <div id="app">
        <div class="loading-container">
            <img src="img/logo_dark.svg" alt="Dima" class="loading-logo" />
            <div class="loading-bar-container">
                <div class="loading-bar" style="width: var(--blazor-load-percentage, 0%)"></div>
            </div>
            <div class="loading-text">
                Carregando...
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        Ocorreu um erro inesperado na aplicação.
        <a href="." class="reload">Recarregar</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js?v=1"></script>
    
    <script>navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' });</script>
    <script src="js/stripe-checkout.js"></script>
</body>

</html>
